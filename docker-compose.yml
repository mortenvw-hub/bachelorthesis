services:

  importer:
    image: ghcr.io/nfdi4objects/n4o-graph-importer:main
    container_name: LODatVZG-importer
    ports:
      - ${IMPORT:-5020}:5020
    volumes:
      - ${STAGE:-./stage}:/app/stage
      - ${DATA:-./data/prepared_data}:/app/data:ro
    networks:
      - LODatVZG
    environment:
      - TITLE=LOD@VZG Graph Importer
      - SPARQL=http://fuseki:3030/LODatVZG
      # The database is set to a local testing environment
      - FRONTEND=http://localhost:8000/
      - BASE=http://localhost:8000/

  fuseki:
    image: ghcr.io/nfdi4objects/n4o-fuseki:main
    container_name: LODatVZG-fuseki
    volumes:
      - ./dockerfiles/fuseki/config.ttl:/fuseki/config.ttl
    # The following lines can be uncommented to enable persistent saving of the triple store
    #  - ./fuseki/logs:/fuseki/logs
    #  - ./fuseki/databases:/fuseki/databases
    #  - ./fuseki/log4j2.properties:/fuseki/log4j2.properties:ro
    networks:
      - LODatVZG
    restart: always

  apis:
    image: ghcr.io/nfdi4objects/n4o-graph-apis@sha256:ddcaada4f7ca21871e5480393f1868388ef45b3ba195731ccfb1a64e3f9e71fd
    container_name: LODatVZG-apis
    ports:
      - ${PORT:-8000}:8000
    volumes:
      - ./dockerfiles/api/config-apis.yml:/app/config.yaml:ro 
      - ${STAGE:-./stage}:/app/stage:ro
      - ${QUERIES:-./dockerfiles/api/queries}:/app/queries
      - ./dockerfiles/api/templates:/app/templates
      - ./dockerfiles/api/static/favicon.ico:/app/static/favicon.ico
      - ./dockerfiles/api/static/style.css:/app/static/style.css
      - ./dockerfiles/api/app.py:/app/app.py 
    networks:
      - LODatVZG
    environment:
      - SPARQL=http://fuseki:3030/LODatVZG
      # The database is set to a local testing environment
      - BASE=http://localhost:8000/

networks:
  LODatVZG:
    driver: bridge